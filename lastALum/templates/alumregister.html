<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alumni Registration</title>
    <link rel="stylesheet" href="/static/alumregisterstyle.css" />
  </head>
  <body>
    <div class="register-container">
      <h2>Alumni Registration</h2>
      <form action="/alumregisterdata" method="post">
        <!-- onsubmit="register(event)" -->
        <div class="form-group">
          <label for="first-name">First Name</label>
          <input
            type="text"
            id="first-name"
            name="first-name"
            placeholder="Enter your first name"
            required
          />
        </div>

        <!-- Last Name -->
        <div class="form-group">
          <label for="last-name">Last Name</label>
          <input
            type="text"
            name="last-name"
            id="last-name"
            placeholder="Enter your last name"
            required
          />
        </div>

        <!-- LinkedIn URL -->
        <div class="form-group">
          <label for="linkedin">LinkedIn URL</label>
          <input
            type="url"
            id="linkedin"
            name="linkedin"
            placeholder="Enter your LinkedIn URL"
            required
          />
        </div>

        <!-- Year of Declaration -->
        <div class="form-group">
          <label for="year">Year of Declaration</label>
          <input
            type="number"
            id="year"
            name="year"
            placeholder="Enter year of declaration"
            required
          />
        </div>

        <!-- Contact -->
        <div class="form-group">
          <label for="contact">Contact</label>
          <input
            type="text"
            id="contact"
            name="contact"
            placeholder="Enter your contact number"
          />
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            required
          />
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">Create Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Create a password"
            required
          />
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input
            type="password"
            name="confirm-password"
            id="confirm-password"
            placeholder="Confirm your password"
            required
          />
        </div>

        <!-- Submit Button -->
        <button type="submit">Register</button>
      </form>
      <div><p>{{status}}</p></div>
    </div>

    <script>
      function register(event) {
        event.preventDefault();
        const password = document.getElementById("password").value;
        const confirmPassword =
          document.getElementById("confirm-password").value;

        if (password !== confirmPassword) {
          alert("Passwords do not match!");
          return;
        }

        //redirect after registration
        window.location.href = "alumlogin.html";
      }
    </script>
  </body>
</html>
