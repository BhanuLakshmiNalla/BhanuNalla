<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alumni Login Page</title>
    <link rel="stylesheet" href="/static/alumloginstyle.css" />
  </head>
  <body>
    <div class="login-container">
      <h2>Login</h2>
      <form action="/alumlog" method="post">
        <!---onsubmit="return validateLogin()">-->
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            required
          />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            required
          />
        </div>
        <button type="submit">Login</button>
      </form>
      <div><p>{{status}}</p></div>
      <div class="error-message" id="error-message" style="color: red"></div>
      <div class="register-link">
        <p>New user? <a href="/alumregister">Register here</a></p>
      </div>
    </div>
