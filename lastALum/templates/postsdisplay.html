<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      header nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #333399;
        padding: 20px;
        color: white;
        border-radius: 10px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
      }
      .post-card {
        background-color: #fff;
        border-radius: 10px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        padding: 20px;
        text-align: center;
        width: 18%;
        float: left;
        margin: 20px;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }
      .post-card:hover {
        box-shadow: 5px 5px 5px gray;
      }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <h1>Job posts</h1>
      </nav>
    </header>
    {%for i in postdata: %}
    <div class="post-card">
      <h1 name=" job-role">{{i["job-role"]}}</h1>
      <h3 name="company">{{i["job-company"]}}</h3>
      <h3 name="pack">{{i["job-package"]}}</h3>
      <h3 name="eligibility">{{i["job-eligibility"]}}</h3>
      <p name="description">{{i["job-description"]}}</p>
      <h4 name="joburl"><a href="blank">{{i["job-url"]}}</a></h4>
      <h6 name="posted">{{i["job-poster"]}}</h6>
      <a href="/delete_post/{{ i['job-url']|e }}">Delete</a>
      
    </div>
    </div>
    {%endfor %}
  </body>
</html>
