<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Posting Page</title>
    <link rel="stylesheet" href="/static/jobpostingstyles.css" />
  </head>
  <body>
    <header>
      <h1>Job Postings</h1>
    </header>

    <section class="post-actions">
      <button id="add-job-btn">Add New Job</button>
      <a href="/postsdisplay"
        ><button id="showjobposts">Show Job Posts</button></a
      >
    </section>

    <!-- show job posts --
    <div class="job-container"></div>-->

    <!--adding/editing job posts -->
    <div id="job-modal" class="modal">
      <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h2 id="modal-title">Add Job Post</h2>

        <form id="job-form" action="/addjobpost" method="post">
          <label for="job-role">Role:</label>
          <input type="text" id="job-role" name="job-role" />

          <label for="job-company">Company:</label>
          <input type="text" id="job-company" name="job-company" required />

          <label for="job-package">Package Offered:</label>
          <input type="text" id="job-package" name="job-package" required />

          <label for="job-eligibility">Eligibility:</label>
          <input
            type="text"
            id="job-eligibility"
            name="job-eligibility"
            required
          />

          <label for="job-description">Description (max 5 lines):</label>
          <textarea
            id="job-description"
            rows="5"
            maxlength="300"
            name="job-description"
            required
          ></textarea>

          <label for="job-url">Apply Url</label>
          <input type="text" id="job-role" name="job-url" />

          <label for="job-poster">Posted by:</label>
          <input type="text" id="job-poster" name="job-poster" required />

          <!-- Updated OK Button -->
          <button type="submit">OK</button>
        </form>
      </div>
    </div>
    <script>
      document.getElementById("add-job-btn").onclick = () => {
        document.getElementById("job-modal").style.display = "block";
      };
    </script>

    <!--<script src="/static/jobpostingjs.js"></script>--->
  </body>
</html>
